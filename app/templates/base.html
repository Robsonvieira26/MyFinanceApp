<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }} — MyFinanceApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/app.css">
<script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>
<body>
<div class="side-backdrop"></div>

<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-panel">
    <div class="modal-hdr">
      <span class="modal-tag">›_</span>
      <span class="modal-title" id="modal-title">formulário</span>
      <button class="modal-close" id="modal-close" aria-label="fechar">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<div class="app">
  {% include "_partials/sidebar.html" %}
  <main class="main">
    {% include "_partials/topbar.html" %}
    {% block content %}{% endblock %}
    {% include "_partials/statusbar.html" %}
  </main>
</div>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
