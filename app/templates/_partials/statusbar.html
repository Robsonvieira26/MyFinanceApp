<div class="status-bar">
  <div class="sb-left">
    <span class="sb-prompt">~/</span>
    <span class="sb-path">{{ (page_title or "home") | lower }}</span>
    <span class="sb-sep">·</span>
    <span class="sb-cmd">now running</span>
    <span class="sb-flag">--tracker:on</span>
  </div>
  <div class="sb-right">
    <span class="sb-x">EXR <b>2026</b></span>
    <span class="sb-sep">·</span>
    <span class="sb-x">CCY <b>BRL</b></span>
    <span class="sb-sep">·</span>
    <span class="sb-x ok">● sync</span>
  </div>
</div>
