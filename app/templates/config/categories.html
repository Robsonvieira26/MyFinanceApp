{% extends "base.html" %}

{% block content %}
<div class="header">
  <div>
    <h1>Categorias<span class="blink">▊</span></h1>
    <div class="subtitle">{{ categories | length }} ativa(s) · orçamento por categoria</div>
  </div>
  <div class="actions">
    <a class="btn"
       hx-get="/config/categorias/novo" hx-select="#modal-frag" hx-target="#modal-body"
       data-modal-title="nova categoria">[ + ] nova categoria</a>
  </div>
</div>

<div class="content">
  <table class="tx-table">
    <thead>
      <tr><th style="width:48px;">Ícone</th><th>Nome</th><th>Alvo mensal</th><th></th></tr>
    </thead>
    <tbody>
      {% for c in categories %}
        <tr>
          <td style="text-align:center;">
            <span class="material-icons" style="font-size:20px; vertical-align:middle; color:var(--primary);">{{ c.icon or 'category' }}</span>
          </td>
          <td>{{ c.name }}</td>
          <td>
            <form method="post" action="/config/categorias/{{ c.id }}/budget" style="display:flex; gap:6px; align-items:center;">
              <input type="text" name="amount" value="{{ '%.2f' | format(budgets_map.get(c.id, 0)) }}" style="width: 100px; background: var(--bg); color: var(--text); border: 1px solid var(--border-2); padding: 4px 6px;">
              <button type="submit" class="btn secondary" style="padding:4px 10px; font-size:9px;">salvar</button>
            </form>
          </td>
          <td></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

</div>
{% endblock %}
